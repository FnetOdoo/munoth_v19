[options]
addons_path = /home/fnet/odoo19/munoth_v19/odoo/addons,/home/fnet/odoo19/munoth_v19/addons,/home/fnet/odoo19/munoth_v19/custom/enterprise_addons,/home/fnet/odoo19/munoth_v19/custom/addons
admin_passwd = admin123
db_host = localhost
db_maxconn = 64
db_user = odoo19
db_password = admin
db_port = 5436
http_port = 8013
without_demo = all

; ---- Worker / CPU / Memory tuning ----
workers = 4
max_cron_threads = 2

; CPU time limit per request (seconds) - increase for large restores/reports
limit_time_cpu = 3600

; Wall-clock time limit per request (seconds)
limit_time_real = 7200

; Optional: give cron jobs even more time (Odoo 16+)
limit_time_real_cron = -1

; Memory limits (in bytes) - raise these so restore doesn't get OOM-killed
limit_memory_soft = 2147483648
limit_memory_hard = 2684354560

; Requests per worker before recycling (avoid too-low value causing restarts)
limit_request = 8192

log_level = info